name: run-analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: python3 run_analysis.py

      - name: Upload figures and analysis tables
        uses: actions/upload-artifact@v4
        with:
          name: cadences-analysis-outputs
          path: |
            figures/*.png
            outputs/*.csv
          retention-days: 30
